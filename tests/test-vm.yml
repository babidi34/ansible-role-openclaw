---
# Test playbook for Vagrant VM
- name: Test OpenClaw deployment on VM
  hosts: all
  become: true

  vars:
    # Test configuration
    openclaw_llm_provider: "ollama"  # Use local Ollama for testing
    openclaw_llm_ollama_base_url: "http://127.0.0.1:11434"

    # Enable filesystem MCP for testing
    openclaw_mcp_servers_defaults:
      - name: filesystem
        enabled: true
        command: npx
        args:
          - "-y"
          - "@modelcontextprotocol/server-filesystem"
          - "/home/openclaw/.openclaw/workspace"

  roles:
    - role: openclaw

  post_tasks:
    - name: Wait for OpenClaw service to start
      ansible.builtin.wait_for:
        port: 18789
        host: localhost
        timeout: 60

    - name: Test gateway health endpoint
      ansible.builtin.uri:
        url: http://localhost:18789/health
        status_code: 200
        timeout: 10
      retries: 5
      delay: 5
      register: health_check

    - name: Display health check result
      ansible.builtin.debug:
        var: health_check

    - name: Verify OpenClaw binary exists
      ansible.builtin.command: which openclaw
      register: openclaw_bin
      changed_when: false

    - name: Display OpenClaw binary path
      ansible.builtin.debug:
        var: openclaw_bin.stdout

    - name: Verify configuration file exists
      ansible.builtin.stat:
        path: /home/openclaw/.openclaw/openclaw.json
      register: config_file

    - name: Assert configuration exists
      ansible.builtin.assert:
        that:
          - config_file.stat.exists
        fail_msg: "OpenClaw configuration file not found"

    - name: Display success message
      ansible.builtin.debug:
        msg: "OpenClaw deployment test PASSED"
