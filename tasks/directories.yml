---
- name: Create openclaw directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"
    mode: "0750"
  loop:
    - "{{ openclaw_config_dir }}"
    - "{{ openclaw_data_dir }}"
    - "{{ openclaw_log_dir }}"
    - "{{ openclaw_workspace_dir }}"
    - "{{ openclaw_upstream_dir }}"
    - "{{ openclaw_upstream_credentials_dir }}"
    - "{{ openclaw_upstream_agents_dir }}"
    - "{{ openclaw_tmp_dir }}"
