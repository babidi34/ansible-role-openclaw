---
- name: Ensure group exists
  ansible.builtin.group:
    name: "{{ openclaw_group }}"
    system: true

- name: Ensure user exists
  ansible.builtin.user:
    name: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"
    home: "{{ openclaw_home }}"
    shell: /bin/bash
    create_home: true
    system: true
