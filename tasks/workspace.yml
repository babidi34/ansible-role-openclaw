---
- name: Initialize workspace (manual step placeholder)
  ansible.builtin.command: "{{ openclaw_cli_name }} setup"
  become: true
  become_user: "{{ openclaw_user }}"
  environment:
    HOME: "{{ openclaw_home }}"
  args:
    creates: "{{ openclaw_workspace_dir }}/AGENTS.md"
  when: openclaw_workspace_init | bool
