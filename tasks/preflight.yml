---
- name: Validate install method and source
  ansible.builtin.assert:
    that:
      - openclaw_install_method in ["npm", "npm-source", "url", "file"]
      - (openclaw_install_method in ["npm", "npm-source"]) or
        (openclaw_install_method == "url" and (openclaw_install_script_url | length > 0)) or
        (openclaw_install_method == "file" and (openclaw_install_script_file | length > 0))
    fail_msg: "Set openclaw_install_method (npm|npm-source|url|file) and the matching configuration"

- name: Ensure runtime is supported
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'Debian'
    fail_msg: "Only Debian/Ubuntu are supported for now"
