---
- name: Render openclaw JSON config
  ansible.builtin.template:
    src: openclaw.json.j2
    dest: "{{ openclaw_config_path }}"
    owner: "{{ openclaw_config_owner }}"
    group: "{{ openclaw_config_group }}"
    mode: "{{ openclaw_config_mode }}"
  notify: Restart openclaw

- name: Render openclaw .env
  ansible.builtin.template:
    src: openclaw.env.j2
    dest: "{{ openclaw_env_path }}"
    owner: "{{ openclaw_config_owner }}"
    group: "{{ openclaw_config_group }}"
    mode: "0600"
  notify: Restart openclaw
