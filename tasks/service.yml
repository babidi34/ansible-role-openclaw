---
- name: Enable linger for openclaw user
  ansible.builtin.command: "loginctl enable-linger {{ openclaw_user }}"
  args:
    creates: "{{ openclaw_linger_file }}"
  when: openclaw_enable_linger | bool

- name: Ensure user systemd directory exists
  ansible.builtin.file:
    path: "{{ openclaw_home }}/.config/systemd/user"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"
    mode: "0700"
  when: openclaw_enable_user_service | bool

- name: Deploy hardened systemd service file
  ansible.builtin.template:
    src: systemd/openclaw.service.j2
    dest: "{{ openclaw_user_service_unit_path }}"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"
    mode: "0644"
  become: true
  when: openclaw_enable_user_service | bool

- name: Reload systemd user daemon
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  become: true
  become_user: "{{ openclaw_user }}"
  when: openclaw_enable_user_service | bool

- name: Enable openclaw service
  ansible.builtin.systemd:
    name: openclaw
    enabled: true
    scope: user
  become: true
  become_user: "{{ openclaw_user }}"
  when: openclaw_enable_user_service | bool
