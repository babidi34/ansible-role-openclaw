---
- name: Download Moltbot install script
  ansible.builtin.get_url:
    url: "{{ moltbot_install_script_url }}"
    dest: "{{ moltbot_install_script_path }}"
    mode: "0755"
  when: moltbot_install_method == "url"

- name: Copy Moltbot install script
  ansible.builtin.copy:
    src: "{{ moltbot_install_script_file }}"
    dest: "{{ moltbot_install_script_path }}"
    mode: "0755"
  when: moltbot_install_method == "file"

- name: Run Moltbot install script
  ansible.builtin.command:
    argv: "{{ [moltbot_install_script_path] + moltbot_install_flags }}"
  args:
    creates: "{{ moltbot_install_creates }}"
