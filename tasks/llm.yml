---
- name: Validate LLM provider when set
  ansible.builtin.assert:
    that:
      - openclaw_llm_provider in ["", "openai", "anthropic", "mistral", "google", "openrouter", "ollama"]
    fail_msg: "openclaw_llm_provider must be one of openai|anthropic|mistral|google|openrouter|ollama"

- name: Validate provider credentials when set
  ansible.builtin.assert:
    that:
      - (openclaw_llm_provider == "ollama") or (openclaw_llm_api_key | length > 0) or
        (openclaw_llm_openai_api_key | length > 0) or
        (openclaw_llm_anthropic_api_key | length > 0) or
        (openclaw_llm_mistral_api_key | length > 0) or
        (openclaw_llm_google_api_key | length > 0) or
        (openclaw_llm_openrouter_api_key | length > 0)
    fail_msg: "Set at least one API key (or use ollama with local base URL)"
  when: openclaw_llm_provider | length > 0
