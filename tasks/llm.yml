---
- name: Validate LLM provider when set
  ansible.builtin.assert:
    that:
      - openclaw_llm_provider in (["", "ollama"] + (openclaw_llm_providers | map(attribute='name') | list))
    fail_msg: "openclaw_llm_provider must be one of {{ openclaw_llm_providers | map(attribute='name') | join('|') }}|ollama"

- name: Validate provider credentials when set
  ansible.builtin.assert:
    that:
      - (openclaw_llm_provider == "ollama") or
        (openclaw_llm_api_key | length > 0) or
        (openclaw_llm_providers | selectattr('api_key', 'ne', '') | list | length > 0)
    fail_msg: "Set at least one API key (or use ollama with local base URL)"
  when: openclaw_llm_provider | length > 0
