---
# Create credentials directory with restrictive permissions
- name: Create credentials directory
  ansible.builtin.file:
    path: "{{ openclaw_upstream_credentials_dir }}"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"
    mode: '0700'
  become: true

# Deploy credentials files from templates
- name: Deploy Anthropic credentials
  ansible.builtin.template:
    src: credentials/anthropic.json.j2
    dest: "{{ openclaw_upstream_credentials_dir }}/anthropic.json"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"
    mode: '0600'
  become: true
  when: openclaw_credentials.anthropic is defined and openclaw_credentials.anthropic | length > 0
  no_log: true

- name: Deploy OpenAI credentials
  ansible.builtin.template:
    src: credentials/openai.json.j2
    dest: "{{ openclaw_upstream_credentials_dir }}/openai.json"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"
    mode: '0600'
  become: true
  when: openclaw_credentials.openai is defined and openclaw_credentials.openai | length > 0
  no_log: true

- name: Deploy GitHub credentials
  ansible.builtin.template:
    src: credentials/github.json.j2
    dest: "{{ openclaw_upstream_credentials_dir }}/github.json"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"
    mode: '0600'
  become: true
  when: openclaw_credentials.github is defined and openclaw_credentials.github | length > 0
  no_log: true

- name: Deploy GitLab credentials
  ansible.builtin.template:
    src: credentials/gitlab.json.j2
    dest: "{{ openclaw_upstream_credentials_dir }}/gitlab.json"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"
    mode: '0600'
  become: true
  when: openclaw_credentials.gitlab is defined and openclaw_credentials.gitlab | length > 0
  no_log: true

- name: Deploy Telegram credentials
  ansible.builtin.template:
    src: credentials/telegram.json.j2
    dest: "{{ openclaw_upstream_credentials_dir }}/telegram.json"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"
    mode: '0600'
  become: true
  when: openclaw_credentials.telegram is defined and openclaw_credentials.telegram | length > 0
  no_log: true

# Deploy custom credentials
- name: Deploy custom credentials
  ansible.builtin.copy:
    content: "{{ item.value | to_nice_json }}"
    dest: "{{ openclaw_upstream_credentials_dir }}/{{ item.key }}.json"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"
    mode: '0600'
  become: true
  loop: "{{ openclaw_credentials.custom | default({}) | dict2items }}"
  when: openclaw_credentials.custom is defined and openclaw_credentials.custom | length > 0
  no_log: true

- name: Display credentials deployment status
  ansible.builtin.debug:
    msg: "Credentials deployed: {{ openclaw_credentials.keys() | list }}"
