---
# Install and configure mcporter (MCP bridge for OpenClaw)

- name: Verify npx is available (required for mcporter)
  ansible.builtin.command: npx --version
  register: npx_version
  changed_when: false
  failed_when: npx_version.rc != 0

- name: Install mcporter globally
  community.general.npm:
    name: mcporter
    global: true
    state: present
  become: true

- name: Verify mcporter is installed
  ansible.builtin.command: mcporter --version
  register: mcporter_version
  changed_when: false
  failed_when: mcporter_version.rc != 0

- name: Display mcporter version
  ansible.builtin.debug:
    msg: "mcporter version: {{ mcporter_version.stdout }}"

- name: Create mcporter config directory
  ansible.builtin.file:
    path: "{{ openclaw_mcporter_config_dir }}"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"
    mode: "0750"

- name: Deploy mcporter configuration
  ansible.builtin.template:
    src: mcporter.json.j2
    dest: "{{ openclaw_mcporter_config_path }}"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"
    mode: "0640"
  notify: Restart openclaw

- name: List configured MCP servers
  ansible.builtin.debug:
    msg: "mcporter MCP servers: {{ openclaw_mcporter_servers | dict2items | map(attribute='key') | list }}"
  when: openclaw_mcporter_servers | length > 0
