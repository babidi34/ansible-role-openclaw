---
- name: Preflight checks
  ansible.builtin.include_tasks: preflight.yml

- name: Create user and group
  ansible.builtin.include_tasks: user.yml

- name: Create directories
  ansible.builtin.include_tasks: directories.yml

- name: Install base packages
  ansible.builtin.include_tasks: packages.yml

- name: Install Node.js (if using npm method)
  ansible.builtin.include_tasks: nodejs.yml
  when: openclaw_install_method in ['npm', 'npm-source'] and openclaw_nodejs_install | bool

- name: Install OpenClaw CLI
  ansible.builtin.include_tasks: install.yml

- name: Validate LLM settings
  ansible.builtin.include_tasks: llm.yml

- name: Install and configure mcporter (MCP bridge)
  ansible.builtin.include_tasks: mcp.yml
  when: openclaw_mcporter_enabled | bool

- name: Validate actions settings
  ansible.builtin.include_tasks: actions.yml

- name: Validate memory settings
  ansible.builtin.include_tasks: memory.yml

- name: Render configuration
  ansible.builtin.include_tasks: config.yml

- name: Deploy credentials
  ansible.builtin.include_tasks: credentials.yml
  when: openclaw_credentials | length > 0

- name: Ensure workspace files
  ansible.builtin.include_tasks: workspace_files.yml

- name: Configure channels
  ansible.builtin.include_tasks: channels.yml

- name: Configure pass (password-store)
  ansible.builtin.include_tasks: pass.yml
  when: openclaw_pass_enabled | bool

- name: Configure Himalaya email
  ansible.builtin.include_tasks: himalaya.yml
  when: openclaw_himalaya_enabled | bool

- name: Configure systemd service
  ansible.builtin.include_tasks: service.yml

- name: Flush handlers (apply pending service restarts)
  ansible.builtin.meta: flush_handlers

- name: Wait for openclaw gateway to be listening
  ansible.builtin.wait_for:
    port: "{{ openclaw_gateway_port }}"
    host: 127.0.0.1
    timeout: 60

- name: Sync device auth tokens if needed
  ansible.builtin.include_tasks: device_auth.yml

- name: Configure monitoring
  ansible.builtin.include_tasks: monitoring.yml
  when: openclaw_healthcheck_enabled | bool
