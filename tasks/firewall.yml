---
# Configure UFW firewall for OpenClaw
- name: Ensure ufw is installed
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true
  become: true

- name: Configure ufw to deny incoming by default
  community.general.ufw:
    direction: incoming
    policy: deny
  become: true

- name: Configure ufw to allow outgoing by default
  community.general.ufw:
    direction: outgoing
    policy: allow
  become: true

- name: Allow SSH (to prevent lockout)
  community.general.ufw:
    rule: allow
    name: OpenSSH
  become: true

- name: Allow localhost traffic for gateway port
  community.general.ufw:
    rule: allow
    interface: lo
    port: "{{ openclaw_gateway_port }}"
    proto: tcp
  become: true

- name: Enable ufw
  community.general.ufw:
    state: enabled
  become: true

- name: Display firewall status
  ansible.builtin.debug:
    msg: "Firewall configured - gateway port {{ openclaw_gateway_port }} accessible on localhost only"
