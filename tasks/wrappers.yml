---
# Secure command wrappers
# Allows the agent to use CLI tools without seeing the actual tokens
#
# Architecture:
#   /usr/local/bin/<cmd>                    -> user-callable wrapper (calls sudo)
#   /usr/local/libexec/openclaw/<cmd>-exec  -> privileged wrapper (reads token, executes real cmd)
#   /etc/openclaw/secrets/<cmd>_token       -> token file (root:root 0600)
#   /etc/sudoers.d/openclaw-wrappers        -> sudo rules (explicit, no wildcards)
#
# Security:
#   - All files owned by root:root with restrictive permissions
#   - Agent cannot modify wrappers or sudoers (no write access)
#   - Agent cannot read token files (0600 root only)
#   - Sudoers rules list each wrapper explicitly (no wildcards)

- name: Ensure secrets directory exists
  ansible.builtin.file:
    path: "{{ openclaw_secure_wrappers_secrets_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Ensure libexec directory exists
  ansible.builtin.file:
    path: "{{ openclaw_secure_wrappers_libexec_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy token files
  ansible.builtin.copy:
    content: "{{ item.token }}"
    dest: "{{ openclaw_secure_wrappers_secrets_dir }}/{{ item.name }}_token"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ openclaw_secure_wrappers }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true

- name: Deploy privileged wrapper scripts
  ansible.builtin.template:
    src: wrappers/wrapper-exec.sh.j2
    dest: "{{ openclaw_secure_wrappers_libexec_dir }}/{{ item.name }}-exec"
    owner: root
    group: root
    mode: "0755"
  loop: "{{ openclaw_secure_wrappers }}"
  loop_control:
    label: "{{ item.name }}"

- name: Deploy user-callable wrapper scripts
  ansible.builtin.template:
    src: wrappers/wrapper.sh.j2
    dest: "/usr/local/bin/{{ item.name }}"
    owner: root
    group: root
    mode: "0755"
  loop: "{{ openclaw_secure_wrappers }}"
  loop_control:
    label: "{{ item.name }}"

- name: Deploy sudoers configuration
  ansible.builtin.template:
    src: wrappers/sudoers.j2
    dest: /etc/sudoers.d/openclaw-wrappers
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"

- name: Display wrapper deployment status
  ansible.builtin.debug:
    msg: "Secure wrappers deployed: {{ openclaw_secure_wrappers | map(attribute='name') | list | join(', ') }}"
