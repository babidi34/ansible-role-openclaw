---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Check openclaw binary exists
      ansible.builtin.stat:
        path: /usr/local/bin/openclaw
      register: openclaw_bin

    - name: Assert openclaw binary present
      ansible.builtin.assert:
        that:
          - openclaw_bin.stat.exists

    - name: Check config file exists
      ansible.builtin.stat:
        path: /home/openclaw/.clawdbot/openclaw.json
      register: openclaw_cfg

    - name: Assert config file present
      ansible.builtin.assert:
        that:
          - openclaw_cfg.stat.exists
