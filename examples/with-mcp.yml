---
# OpenClaw with MCP servers via mcporter
- name: Deploy OpenClaw with MCP servers
  hosts: all
  become: yes

  vars:
    # LLM Configuration
    openclaw_model_primary: "anthropic/claude-sonnet-4-20250514"
    openclaw_llm_anthropic_api_key: "{{ vault_anthropic_key }}"

    # Sandbox must be disabled for mcporter (Docker sandbox lacks Node.js)
    openclaw_sandbox_mode: "off"

    # MCP Servers via mcporter
    openclaw_mcporter_enabled: true
    openclaw_mcporter_servers:
      context7:
        command: npx
        args: ["-y", "@upstash/context7-mcp"]
      filesystem:
        command: npx
        args:
          - "-y"
          - "@modelcontextprotocol/server-filesystem"
          - "/home/openclaw/.openclaw/workspace"
      github:
        command: npx
        args: ["-y", "@modelcontextprotocol/server-github"]
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: "{{ vault_github_token }}"
      gitlab:
        command: npx
        args: ["-y", "@modelcontextprotocol/server-gitlab"]
        env:
          GITLAB_PERSONAL_ACCESS_TOKEN: "{{ vault_gitlab_token }}"
          GITLAB_API_URL: "https://gitlab.com/api/v4"

  roles:
    - role: openclaw
