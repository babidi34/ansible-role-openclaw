---
# Secure OpenClaw deployment with hardening
- name: Deploy OpenClaw (secure)
  hosts: all
  become: yes

  vars:
    # LLM Configuration
    openclaw_model_primary: "anthropic/claude-sonnet-4-20250514"
    openclaw_llm_anthropic_api_key: "{{ vault_anthropic_key }}"

    # Security
    openclaw_security_hardening: true
    openclaw_gateway_password: "{{ vault_gateway_password }}"

    # Monitoring
    openclaw_healthcheck_enabled: true

    # MCP Servers via mcporter (optional)
    openclaw_sandbox_mode: "off"
    openclaw_mcporter_enabled: true
    openclaw_mcporter_servers:
      context7:
        command: npx
        args: ["-y", "@upstash/context7-mcp"]

  roles:
    - role: openclaw
