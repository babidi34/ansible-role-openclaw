---
# Basic OpenClaw deployment
- name: Deploy OpenClaw (basic)
  hosts: all
  become: yes

  vars:
    # LLM Configuration
    openclaw_llm_provider: "anthropic"
    openclaw_llm_providers:
      - name: anthropic
        env_var: ANTHROPIC_API_KEY
        api_key: "{{ vault_anthropic_key }}"

  roles:
    - role: openclaw
