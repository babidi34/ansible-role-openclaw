---
# OpenClaw role defaults

openclaw_user: openclaw
openclaw_group: openclaw
openclaw_home: /home/openclaw

openclaw_config_dir: /etc/openclaw
openclaw_data_dir: /var/lib/openclaw
openclaw_log_dir: /var/log/openclaw
openclaw_tmp_dir: /tmp/openclaw

# CLI binary
openclaw_cli_name: openclaw
openclaw_cli_bin: /usr/local/bin/openclaw

# Upstream paths (new openclaw structure)
openclaw_upstream_dir: "{{ openclaw_home }}/.openclaw"
openclaw_upstream_credentials_dir: "{{ openclaw_upstream_dir }}/credentials"
openclaw_upstream_agents_dir: "{{ openclaw_upstream_dir }}/agents"
openclaw_upstream_sessions_dir: "{{ openclaw_upstream_agents_dir }}/{{ openclaw_agent_id | default('default') }}/sessions"

# Installation method
openclaw_install_method: npm  # npm|npm-source|url|file
openclaw_npm_package: "openclaw@latest"
openclaw_npm_registry: "https://registry.npmjs.org"

# Legacy install script support (deprecated, use npm method instead)
openclaw_install_script_url: "https://install.openclaw.ai/install.sh"
openclaw_install_script_file: "" # when method=file, path inside role files/
openclaw_install_script_path: /tmp/openclaw-install.sh
openclaw_install_creates: "{{ openclaw_cli_bin }}"

# Install flags for non-interactive setup if supported
openclaw_install_flags:
  - "--no-onboard"
  - "--no-prompt"

# Workspace (new openclaw structure)
openclaw_workspace_dir: "{{ openclaw_upstream_dir }}/workspace"
openclaw_workspace_init: true
openclaw_workspace_files:
  - AGENTS.md
  - BOOTSTRAP.md
  - IDENTITY.md
  - SOUL.md
  - TOOLS.md
  - USER.md

# Systemd service
openclaw_service_unit_path: /etc/systemd/system/openclaw.service

# Core config
openclaw_config_path: "{{ openclaw_upstream_dir }}/openclaw.json"
openclaw_config_owner: "{{ openclaw_user }}"
openclaw_config_group: "{{ openclaw_group }}"
openclaw_config_mode: "0640"
openclaw_config_content: "{}"
openclaw_env_path: "{{ openclaw_upstream_dir }}/.env"

# Gateway
openclaw_gateway_mode: "local"
openclaw_gateway_bind: "loopback"
openclaw_gateway_port: 18789
openclaw_gateway_auth_env: "OPENCLAW_GATEWAY_TOKEN"
openclaw_gateway_auth_token: ""
openclaw_gateway_password: ""

# Agents / models
openclaw_model_primary: ""
openclaw_model_fallbacks: []
openclaw_models_allowlist: {}
openclaw_sandbox_mode: "non-main"  # off|non-main|all
openclaw_sandbox_workspace_access: "rw"  # none|ro|rw

# Channels (placeholders)
openclaw_channels_enabled: []
openclaw_channels_config: {}

# Telegram channel
openclaw_telegram_enabled: false
openclaw_telegram_bot_token: ""
openclaw_telegram_dm_policy: "pairing"
openclaw_telegram_allow_from: []
openclaw_telegram_groups: {}
openclaw_telegram_config_writes: false

# LLM providers
openclaw_llm_provider: ""  # openai|anthropic|mistral|google|openrouter|ollama
openclaw_llm_api_key: ""
openclaw_llm_model: ""
openclaw_llm_base_url: ""
openclaw_llm_timeout: 60
openclaw_llm_openai_api_key: ""
openclaw_llm_anthropic_api_key: ""
openclaw_llm_mistral_api_key: ""
openclaw_llm_google_api_key: ""
openclaw_llm_openrouter_api_key: ""
openclaw_llm_ollama_base_url: "http://127.0.0.1:11434"

# Actions policy
openclaw_actions_allowlist: []
openclaw_actions_denylist:
  - rm
  - shutdown
  - reboot
  - mkfs
  - dd
openclaw_actions_timeout: 30

# SSH outgoing (optional)
openclaw_ssh_private_key_path: ""
openclaw_ssh_known_hosts_path: ""

# Memory backend (optional)
openclaw_memory_backend: ""
openclaw_memory_dsn: ""
openclaw_vector_db_url: ""
openclaw_vector_db_api_key: ""

# Node.js installation (for npm method)
openclaw_nodejs_version: "22"
openclaw_nodejs_install: true
openclaw_nodejs_nodesource_repo: "node_{{ openclaw_nodejs_version }}.x"

# MCP Servers Configuration
openclaw_mcp_servers_enabled: true
openclaw_mcp_servers: []
openclaw_mcp_config_enabled: false
openclaw_mcp_docker_optional: false

# MCP servers catalog (full definitions)
openclaw_mcp_servers_catalog:
  - name: filesystem
    enabled: false
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "{{ openclaw_workspace_dir }}"
    description: "Access to workspace filesystem"

  - name: github
    enabled: false
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-github"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "{{ openclaw_github_token | default('') }}"
    description: "GitHub integration (issues, PRs, repos)"

  - name: gitlab
    enabled: false
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-gitlab"
    env:
      GITLAB_PERSONAL_ACCESS_TOKEN: "{{ openclaw_gitlab_token | default('') }}"
      GITLAB_API_URL: "{{ openclaw_gitlab_api_url | default('https://gitlab.com/api/v4') }}"
    description: "GitLab integration (issues, MRs, repos)"

  - name: docker
    enabled: false
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-docker"
    env:
      DOCKER_HOST: "{{ openclaw_docker_host | default('unix:///var/run/docker.sock') }}"
    description: "Docker container management"

# MCP servers par défaut (tous désactivés par défaut)
openclaw_mcp_servers_defaults: "{{ openclaw_mcp_servers_catalog }}"

# MCP tokens
openclaw_github_token: ""
openclaw_gitlab_token: ""
openclaw_gitlab_api_url: "https://gitlab.com/api/v4"
openclaw_docker_host: "unix:///var/run/docker.sock"

# Credentials management
openclaw_credentials: {}
# Example structure:
# openclaw_credentials:
#   anthropic:
#     api_key: "{{ vault_openclaw_anthropic_key }}"
#   openai:
#     api_key: "{{ vault_openclaw_openai_key }}"
#   github:
#     token: "{{ vault_openclaw_github_token }}"

# Security hardening
openclaw_security_hardening: true
openclaw_security_firewall: false

# Network restrictions
openclaw_gateway_public: false
openclaw_tailscale_mode: "off"  # off|serve|funnel
openclaw_tailscale_enabled: false
openclaw_tailscale_reset_on_exit: true

# Resource limits (for systemd service)
openclaw_memory_max: "2G"
openclaw_nofile_limit: 65536

# Monitoring
openclaw_healthcheck_enabled: false
openclaw_log_retention_days: 30
openclaw_log_max_size: "100M"

# Himalaya email integration
openclaw_himalaya_enabled: false
openclaw_himalaya_version: "latest"
openclaw_himalaya_bin: /usr/local/bin/himalaya
openclaw_himalaya_config_dir: "{{ openclaw_home }}/.config/himalaya"
openclaw_himalaya_config_path: "{{ openclaw_himalaya_config_dir }}/config.toml"

# Himalaya email accounts
# Example with password command (RECOMMENDED - secure):
# openclaw_himalaya_accounts:
#   - name: "personal"
#     email: "user@example.com"
#     display_name: "Mon Nom"
#     default: true
#     imap_host: "imap.example.com"
#     imap_port: 993
#     smtp_host: "smtp.example.com"
#     smtp_port: 587
#     smtp_encryption: "start-tls"  # start-tls|tls
#     login: "user@example.com"
#     # Use password_cmd for secure password retrieval (pass, secret-tool, etc.)
#     password_cmd: "pass show mail/personal"
#     # OR with secret-tool (GNOME keyring):
#     # password_cmd: "secret-tool lookup service imap user user@example.com"
#     # Folder mappings (adjust to match your server's folder names)
#     folder_sent: "Sent"      # Could be: Sent, "Sent Messages", "Envoyés", "INBOX.Sent"
#     folder_drafts: "Drafts"  # Could be: Drafts, "Brouillons", "INBOX.Drafts"
#     folder_trash: "Trash"    # Could be: Trash, "Corbeille", "INBOX.Trash"
#
# Example with raw password (NOT RECOMMENDED - stored in cleartext):
# openclaw_himalaya_accounts:
#   - name: "personal"
#     email: "user@example.com"
#     display_name: "Mon Nom"
#     default: true
#     imap_host: "imap.example.com"
#     imap_port: 993
#     smtp_host: "smtp.example.com"
#     smtp_port: 587
#     smtp_encryption: "start-tls"
#     login: "user@example.com"
#     password: "{{ vault_mail_password }}"  # WARNING: stored in cleartext in config
#     folder_sent: "Sent"
openclaw_himalaya_accounts: []

# Himalaya folder verification
# When enabled, the role will check if required IMAP folders exist and create them if missing
# This helps prevent issues with saving sent messages
openclaw_himalaya_verify_folders: false

# Himalaya auto-reply policy
# disabled: no auto-reply
# manual: openclaw suggests reply but waits for approval
# auto_draft: openclaw creates draft replies automatically
# auto_send: openclaw sends replies automatically (use with caution!)
openclaw_himalaya_reply_policy: "disabled"

# Pass (password-store) integration
# Provides secure password storage for Himalaya email credentials
# When enabled, passwords defined in openclaw_himalaya_accounts will be stored in pass
# and Himalaya will use "pass show mail/<account_name>" to retrieve them
openclaw_pass_enabled: false
openclaw_pass_gpg_key_id: ""               # If empty: auto-generates a GPG key; if set: uses existing key
openclaw_pass_gpg_name: "OpenClaw"         # Name for generated GPG key
openclaw_pass_gpg_email: "openclaw@localhost"  # Email for generated GPG key
openclaw_pass_store_dir: "{{ openclaw_home }}/.password-store"
openclaw_pass_gpg_backup: true             # Export GPG private key to Ansible controller
openclaw_pass_gpg_backup_path: ""          # Default: playbook_dir/credentials/gpg-<hostname>.asc
